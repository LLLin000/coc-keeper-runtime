id: scen_crash_recovery
title: Crash Recovery - Mid-Scenario Restart
tags:
  - acceptance
  - recovery
  - crash
mode: acceptance

actors:
  kp:
    kind: admin
    user_id: u_kp
  p1:
    kind: player
    user_id: u_p1

fixtures:
  adventure: null
  dice_seed: 42
  model_mode: fake_contract
  db_mode: temp_sqlite

steps:
  - actor: kp
    action: command
    name: bind_campaign
    args:
      campaign_id: camp_recovery

  - actor: p1
    action: command
    name: join_campaign
    args: {}

  - actor: p1
    action: command
    name: create_test_profile
    args:
      user_id: u_p1
      name: Investigator One
      occupation: scholar
      age: 25

  - actor: p1
    action: command
    name: set_role
    args:
      role: player

  - actor: p1
    action: command
    name: select_profile
    args:
      profile_id: u_p1

  - actor: p1
    action: command
    name: ready
    args: {}

  - actor: kp
    action: command
    name: start_session
    args: {}

  - actor: p1
    action: command
    name: complete_onboarding
    args: {}

  - actor: p1
    action: message
    text: "检查门"

  - actor: kp
    action: command
    name: resolve_round
    args: {}

  - actor: kp
    action: command
    name: driver.simulate_crash
    args: {}

  - actor: kp
    action: command
    name: driver.restart_runtime
    args: {}

assertions:
  phase_timeline:
    - lobby
    - awaiting_ready
    - awaiting_admin_start
    - onboarding
    - scene_round_open

  state:
    no_duplicate_members: true
