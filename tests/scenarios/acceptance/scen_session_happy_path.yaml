id: scen_session_happy_path
title: Full Session Lifecycle Happy Path
tags:
  - acceptance
  - happy_path
mode: acceptance

actors:
  kp:
    kind: admin
    user_id: u_kp
  p1:
    kind: player
    user_id: u_p1
  p2:
    kind: player
    user_id: u_p2

fixtures:
  adventure: null
  dice_seed: 42
  model_mode: fake_contract
  db_mode: temp_sqlite

steps:
  - actor: kp
    action: command
    name: bind_campaign
    args:
      campaign_id: camp_happy

  - actor: p1
    action: command
    name: join_campaign
    args: {}

  - actor: p2
    action: command
    name: join_campaign
    args: {}

  - actor: p1
    action: command
    name: ready
    args: {}

  - actor: p2
    action: command
    name: ready
    args: {}

  - actor: kp
    action: command
    name: start_session
    args: {}

  - actor: kp
    action: command
    name: complete_onboarding
    args: {}

  - actor: p1
    action: message
    text: "我检查周围的环境"

  - actor: p2
    action: message
    text: "我查看窗户"

  - actor: kp
    action: command
    name: resolve_round
    args: {}

  - actor: kp
    action: command
    name: next_round
    args: {}

assertions:
  phase_timeline:
    - lobby
    - awaiting_ready
    - awaiting_admin_start
    - onboarding
    - scene_round_open
    - scene_round_resolving
    - scene_round_open

  state:
    campaign_members: 2
    no_duplicate_members: true

  visible:
    public_must_include:
      - "就位"
