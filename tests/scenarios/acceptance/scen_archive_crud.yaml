# Archive CRUD E2E Scenario
# Validates: Create → Read → Update → Delete flow

scenario:
  id: scen_archive_crud
  name: "Archive CRUD Operations"
  description: "Validates full archive CRUD lifecycle"
  
actors:
  - id: p1
    role: player
    name: "测试玩家"

initial_state:
  dice_mode: seeded
  dice_seed: 12345
  
steps:
  # Create profile
  - actor: p1
    action: command
    name: create_profile
    args:
      name: "张三"
      occupation: "医生"
      age: 35
      concept: "38岁的落魄临床医生"
      
  - actor: system
    action: assert
    assertions:
      profile_created:
        name: "张三"
        occupation: "医生"
        has_profile_id: true
        has_coc_stats: true
        
  # Read profile
  - actor: p1
    action: command
    name: get_profile
    args:
      profile_id: "{{last_created_profile_id}}"
      
  - actor: system
    action: assert
    assertions:
      profile_retrieved:
        name: "张三"
        coc:
          san: "> 0"
          hp: "> 0"
          
  # Update profile
  - actor: p1
    action: command
    name: update_profile
    args:
      profile_id: "{{last_created_profile_id}}"
      updates:
        name: "张三（已更新）"
        age: 36
        
  - actor: system
    action: assert
    assertions:
      profile_updated:
        name: "张三（已更新）"
        age: 36
        occupation: "医生"  # Unchanged
        
  # Update skills
  - actor: p1
    action: command
    name: update_skills
    args:
      profile_id: "{{last_created_profile_id}}"
      skills:
        医学: 60
        急救: 45
        
  - actor: system
    action: assert
    assertions:
      skills_updated:
        医学: 60
        急救: 45
        
  # List profiles
  - actor: p1
    action: command
    name: list_profiles
    args: {}
    
  - actor: system
    action: assert
    assertions:
      profiles_listed:
        count: 1
        contains:
          - name: "张三（已更新）"
            
  # Delete profile
  - actor: p1
    action: command
    name: delete_profile
    args:
      profile_id: "{{last_created_profile_id}}"
      
  - actor: system
    action: assert
    assertions:
      profile_deleted:
        list_count: 0
        get_returns: null

expected_outcomes:
  - crud_completed: true
  - persistence_verified: true
  - all_operations_successful: true
