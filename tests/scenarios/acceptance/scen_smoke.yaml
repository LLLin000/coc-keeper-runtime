id: scen_smoke
title: Smoke Test Scenario
tags:
  - acceptance
  - smoke
mode: acceptance

actors:
  kp:
    kind: admin
    user_id: u_kp
  p1:
    kind: player
    user_id: u_p1

fixtures:
  adventure: null
  dice_seed: 42
  model_mode: fake_contract
  db_mode: temp_sqlite

steps:
  - actor: kp
    action: command
    name: bind_campaign
    args:
      campaign_id: camp_smoke_test

  - actor: kp
    action: command
    name: get_phase
    args: {}

  - actor: p1
    action: command
    name: join_campaign
    args: {}

assertions:
  final_phase: lobby

  state:
    campaign_members: 2
    no_duplicate_members: true
