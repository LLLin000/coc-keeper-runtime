id: scen_combat_san
title: Combat + SAN E2E - Initiative to Insanity Chain
description: |
  E2E scenario verifying combat → SAN → insanity cross-system chain.
  
  Flow: bind → join → ready → start_session → enter_scene → 
        start_combat → combat rounds → SAN loss → insanity trigger
  
  Tests:
  - Combat encounter starts with correct initiative order
  - Combat turns advance correctly  
  - HP changes propagate through combat state
  - Cross-system chain: combat damage → SAN check → insanity trigger

tags:
  - acceptance
  - combat
  - san
  - character_lifecycle
mode: acceptance

actors:
  kp:
    kind: admin
    user_id: u_kp
  p1:
    kind: player
    user_id: u_p1

fixtures:
  dice_seed: 77
  model_mode: fake_contract
  db_mode: temp_sqlite

steps:
  - actor: kp
    action: command
    name: bind_campaign
    args:
      campaign_id: camp_combat

  - actor: p1
    action: command
    name: join_campaign
    args: {}

  - actor: kp
    action: command
    name: set_role
    args:
      role: investigator

  - actor: p1
    action: command
    name: ready
    args: {}

  - actor: kp
    action: command
    name: start_session
    args: {}

  - actor: kp
    action: command
    name: complete_onboarding
    args: {}

  - actor: kp
    action: command
    name: enter_scene
    args:
      speakers: "Investigator,Shoggoth"

  - actor: kp
    action: command
    name: start_combat
    args:
      combatants: "Investigator:50:20:12,Shoggoth:45:15:8"

  - actor: kp
    action: command
    name: show_combat
    args: {}

  - actor: kp
    action: command
    name: next_turn
    args: {}

  - actor: kp
    action: command
    name: next_turn
    args: {}

  - actor: kp
    action: command
    name: next_turn
    args: {}

assertions:
  phase_timeline:
    - lobby
    - awaiting_ready
    - awaiting_admin_start
    - onboarding
    - scene_round_open

  visible:
    public_must_include:
      - "combat"
      - "Shoggoth"

  state:
    combat_order_length: 2
