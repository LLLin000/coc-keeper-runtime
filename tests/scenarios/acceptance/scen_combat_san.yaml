id: scen_combat_san
title: Combat + SAN E2E - Initiative to Insanity Chain
description: |
  E2E scenario verifying combat → SAN → insanity cross-system chain.

tags:
  - acceptance
  - combat
  - san
mode: acceptance

actors:
  kp:
    kind: admin
    user_id: u_kp
  p1:
    kind: player
    user_id: u_p1

fixtures:
  dice_seed: 77
  model_mode: fake_contract
  db_mode: temp_sqlite

steps:
  - actor: kp
    action: command
    name: bind_campaign
    args:
      campaign_id: camp_combat

  - actor: p1
    action: command
    name: create_test_profile
    args:
      user_id: u_p1
      name: Investigator One
      occupation: scholar
      age: 25

  - actor: p1
    action: command
    name: join_campaign
    args: {}

  - actor: p1
    action: command
    name: set_role
    args:
      role: player

  - actor: p1
    action: command
    name: select_profile
    args:
      profile_id: u_p1

  - actor: p1
    action: command
    name: ready
    args: {}

  - actor: kp
    action: command
    name: start_session
    args: {}

  - actor: p1
    action: command
    name: complete_onboarding
    args: {}

  - actor: kp
    action: command
    name: enter_scene
    args:
      speakers: "Investigator,Shoggoth"

  - actor: kp
    action: command
    name: start_combat
    args:
      combatants: "Investigator:50:20:12,Shoggoth:45:15:8"

  - actor: kp
    action: command
    name: next_turn
    args: {}

assertions:
  phase_timeline:
    - lobby
    - awaiting_ready
    - awaiting_admin_start
    - onboarding
    - scene_round_open

  state:
    campaign_members: 2
    no_duplicate_members: true
