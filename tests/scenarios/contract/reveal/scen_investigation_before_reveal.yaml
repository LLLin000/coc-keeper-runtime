id: scen_investigation_before_reveal
title: Investigation Before Reveal Prerequisite Is Forbidden
tags:
  - contract
  - reveal
  - fuzhe_mini
mode: contract

actors:
  kp:
    kind: admin
    user_id: u_kp
  p1:
    kind: player
    user_id: u_p1

fixtures:
  adventure: fuzhe_mini
  dice_seed: 42
  model_mode: fake_contract
  db_mode: temp_sqlite

steps:
  - actor: kp
    action: command
    name: bind_campaign
    args:
      campaign_id: camp_investigation_before_reveal

  - actor: kp
    action: command
    name: get_phase
    args: {}

  - actor: p1
    action: command
    name: join_campaign
    args:
      campaign_id: camp_investigation_before_reveal

  - actor: p1
    action: command
    name: advance_story
    args:
      scene_id: car_crash_scene

  # Player tries to investigate at wetland WITHOUT having done prerequisite
  # (this simulates checking for knowledge before it's earned)
  - actor: p1
    action: command
    name: move_to_location
    args:
      location_id: wetland_gate

  # First assertion: clue should NOT be revealed yet (no battle fought)
  - actor: p1
    action: command
    name: interact
    args:
      interactable_id: listen_noise

assertions:
  visible:
    player_forbidden:
      - spring_shock
      - magical_girl_truth

  state:
    spring_shock_defeated: false
