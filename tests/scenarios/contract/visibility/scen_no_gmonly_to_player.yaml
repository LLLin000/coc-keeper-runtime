id: scen_no_gmonly_to_player
title: GM-only Field Must Not Leak to Player
tags:
  - contract
  - visibility
  - gm_only
mode: contract

actors:
  kp:
    kind: admin
    user_id: u_kp
  p1:
    kind: player
    user_id: u_p1

fixtures:
  adventure: fuzhe
  dice_seed: 42
  model_mode: fake_contract
  db_mode: temp_sqlite

steps:
  - actor: kp
    action: command
    name: bind_campaign
    args:
      campaign_id: camp_visibility_test

  - actor: kp
    action: command
    name: load_adventure
    args:
      adventure_id: fuzhe

  - actor: p1
    action: command
    name: join_campaign
    args: {}

  - actor: kp
    action: command
    name: start_session
    args: {}

  - actor: p1
    action: message
    text: "我检查周围的环境"

  - actor: kp
    action: message
    text: "你看到了一切"

assertions:
  phase_timeline:
    - lobby
    - awaiting_ready
    - scene_round_open

  visible:
    player_forbidden:
      - "module_rule_mode"

  state:
    campaign_members: 2
    no_duplicate_members: true
