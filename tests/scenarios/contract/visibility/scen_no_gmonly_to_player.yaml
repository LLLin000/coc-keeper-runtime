id: scen_no_gmonly_to_player
title: GM-only Field Must Not Leak to Player
tags:
  - contract
  - visibility
  - gm_only
mode: contract

actors:
  kp:
    kind: admin
    user_id: u_kp

fixtures:
  adventure: fuzhe
  dice_seed: 42
  model_mode: fake_contract
  db_mode: temp_sqlite

steps:
  - actor: kp
    action: command
    name: bind_campaign
    args:
      campaign_id: camp_visibility_test

  - actor: kp
    action: command
    name: load_adventure
    args:
      adventure_id: fuzhe

  - actor: kp
    action: command
    name: start_session
    args: {}

  - actor: kp
    action: command
    name: complete_onboarding
    args: {}

  - actor: kp
    action: message
    text: "KP checks module state"

assertions:
  phase_timeline:
    - lobby
    - onboarding
    - scene_round_open

  visible:
    player_forbidden:
      - "module_rule_mode"

  state:
    campaign_members: 1
    no_duplicate_members: true
